<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="420" fill="url(#bg)" rx="12" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#1e293b" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="bold">How It Works</text>

  <!-- ====== ROW 1: Steps 1-4 ====== -->

  <!-- Step 1: Analyze -->
  <rect x="20" y="60" width="150" height="120" rx="10" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
  <text x="40" y="82" fill="#dbeafe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">STEP 1</text>
  <text x="95" y="108" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="bold">Analyze</text>
  <text x="95" y="128" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Detect language</text>
  <text x="95" y="143" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Keyword + semantic scan</text>
  <text x="95" y="158" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Assess complexity</text>

  <!-- Arrow 1->2 -->
  <line x1="170" y1="120" x2="210" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Match -->
  <rect x="215" y="60" width="150" height="120" rx="10" fill="#8b5cf6" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="235" y="82" fill="#ede9fe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">STEP 2</text>
  <text x="290" y="108" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="bold">Match</text>
  <text x="290" y="128" text-anchor="middle" fill="#ede9fe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">14 categories</text>
  <text x="290" y="143" text-anchor="middle" fill="#ede9fe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">209+ roles</text>
  <text x="290" y="158" text-anchor="middle" fill="#ede9fe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Key Skills matching</text>

  <!-- Arrow 2->3 -->
  <line x1="365" y1="120" x2="405" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Select -->
  <rect x="410" y="60" width="150" height="120" rx="10" fill="#0891b2" stroke="#0e7490" stroke-width="1.5"/>
  <text x="430" y="82" fill="#cffafe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">STEP 3</text>
  <text x="485" y="108" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="bold">Select</text>
  <text x="485" y="128" text-anchor="middle" fill="#cffafe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">1-3 specialists</text>
  <text x="485" y="143" text-anchor="middle" fill="#cffafe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Choose model</text>
  <text x="485" y="158" text-anchor="middle" fill="#cffafe" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Classify dependencies</text>

  <!-- Arrow 3->4 -->
  <line x1="560" y1="120" x2="600" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Propose & Confirm -->
  <rect x="605" y="60" width="175" height="120" rx="10" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <rect x="735" y="63" width="40" height="16" rx="8" fill="#fbbf24"/>
  <text x="755" y="74" text-anchor="middle" fill="#78350f" font-family="Segoe UI, system-ui, sans-serif" font-size="8" font-weight="bold">USER</text>
  <text x="625" y="82" fill="#fef3c7" font-family="Segoe UI, system-ui, sans-serif" font-size="10">STEP 4</text>
  <text x="693" y="108" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="bold">Propose &amp; Confirm</text>
  <text x="693" y="128" text-anchor="middle" fill="#fef3c7" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Show roles + key skills</text>
  <text x="693" y="143" text-anchor="middle" fill="#fef3c7" font-family="Segoe UI, system-ui, sans-serif" font-size="10">User approves/changes</text>
  <text x="693" y="158" text-anchor="middle" fill="#fef3c7" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Override roles or model</text>

  <!-- Connector Row 1 -> Row 2 -->
  <path d="M 780 120 L 820 120 L 820 310 L 80 310 L 80 330" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ====== ROW 2: Steps 5-7 + Done ====== -->

  <!-- Step 5: Dispatch -->
  <rect x="20" y="265" width="200" height="130" rx="10" fill="#059669" stroke="#047857" stroke-width="1.5"/>
  <text x="40" y="287" fill="#d1fae5" font-family="Segoe UI, system-ui, sans-serif" font-size="10">STEP 5</text>
  <text x="120" y="313" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="bold">Dispatch Agents</text>
  <text x="120" y="335" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Parallel if INDEPENDENT</text>
  <text x="120" y="350" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Sequential if DEPENDENT</text>
  <text x="120" y="365" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Confidence: HIGH / MED / LOW</text>
  <text x="120" y="380" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Handoff notes between agents</text>

  <!-- Arrow 5->6 -->
  <line x1="220" y1="330" x2="270" y2="330" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: Review -->
  <rect x="275" y="265" width="200" height="130" rx="10" fill="#dc2626" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="295" y="287" fill="#fecaca" font-family="Segoe UI, system-ui, sans-serif" font-size="10">STEP 6</text>
  <text x="375" y="313" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="bold">Review Agent</text>
  <text x="375" y="335" text-anchor="middle" fill="#fecaca" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Completeness check</text>
  <text x="375" y="350" text-anchor="middle" fill="#fecaca" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Conflict detection</text>
  <text x="375" y="365" text-anchor="middle" fill="#fecaca" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Integration verification</text>
  <text x="375" y="380" text-anchor="middle" fill="#fecaca" font-family="Segoe UI, system-ui, sans-serif" font-size="10">APPROVE / REVISE / ESCALATE</text>

  <!-- Arrow 6->7 -->
  <line x1="475" y1="330" x2="525" y2="330" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 7: Synthesize -->
  <rect x="530" y="265" width="200" height="130" rx="10" fill="#db2777" stroke="#be185d" stroke-width="1.5"/>
  <text x="550" y="287" fill="#fbcfe8" font-family="Segoe UI, system-ui, sans-serif" font-size="10">STEP 7</text>
  <text x="630" y="313" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="bold">Synthesize</text>
  <text x="630" y="335" text-anchor="middle" fill="#fbcfe8" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Merge agent outputs</text>
  <text x="630" y="350" text-anchor="middle" fill="#fbcfe8" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Resolve conflicts</text>
  <text x="630" y="365" text-anchor="middle" fill="#fbcfe8" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Aggregate confidence</text>
  <text x="630" y="380" text-anchor="middle" fill="#fbcfe8" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Present unified answer</text>

  <!-- Arrow 7->Done -->
  <line x1="730" y1="330" x2="780" y2="330" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Done badge -->
  <rect x="785" y="305" width="90" height="50" rx="25" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="830" y="336" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="bold">Done</text>

  <!-- Footer note -->
  <text x="500" y="412" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-style="italic">* Review Agent activates only when 2+ agents are dispatched</text>
</svg>
