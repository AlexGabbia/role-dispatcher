<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="box4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="box5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="box6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="box7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold">Role Dispatcher Workflow</text>

  <!-- Row 1: Steps 1-4 -->
  <!-- Step 1: User Request -->
  <rect x="30" y="70" width="120" height="90" rx="10" fill="url(#box1)" filter="url(#shadow)"/>
  <text x="90" y="105" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">User</text>
  <text x="90" y="125" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">Request</text>
  <text x="90" y="148" text-anchor="middle" fill="#bfdbfe" font-family="Segoe UI, Arial, sans-serif" font-size="10">EN / IT</text>

  <!-- Arrow 1->2 -->
  <line x1="150" y1="115" x2="185" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Analyze -->
  <rect x="190" y="70" width="120" height="90" rx="10" fill="url(#box2)" filter="url(#shadow)"/>
  <text x="250" y="100" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">Analyze</text>
  <text x="250" y="120" text-anchor="middle" fill="#ddd6fe" font-family="Segoe UI, Arial, sans-serif" font-size="10">Detect language</text>
  <text x="250" y="135" text-anchor="middle" fill="#ddd6fe" font-family="Segoe UI, Arial, sans-serif" font-size="10">Match keywords</text>
  <text x="250" y="150" text-anchor="middle" fill="#ddd6fe" font-family="Segoe UI, Arial, sans-serif" font-size="10">Assess complexity</text>

  <!-- Arrow 2->3 -->
  <line x1="310" y1="115" x2="345" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Match Categories -->
  <rect x="350" y="70" width="120" height="90" rx="10" fill="url(#box3)" filter="url(#shadow)"/>
  <text x="410" y="100" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">Match</text>
  <text x="410" y="120" text-anchor="middle" fill="#a5f3fc" font-family="Segoe UI, Arial, sans-serif" font-size="10">13 categories</text>
  <text x="410" y="135" text-anchor="middle" fill="#a5f3fc" font-family="Segoe UI, Arial, sans-serif" font-size="10">185+ roles</text>
  <text x="410" y="150" text-anchor="middle" fill="#a5f3fc" font-family="Segoe UI, Arial, sans-serif" font-size="10">Keyword index</text>

  <!-- Arrow 3->4 -->
  <line x1="470" y1="115" x2="505" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Select Roles -->
  <rect x="510" y="70" width="120" height="90" rx="10" fill="url(#box4)" filter="url(#shadow)"/>
  <text x="570" y="100" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold">Select Roles</text>
  <text x="570" y="120" text-anchor="middle" fill="#fef3c7" font-family="Segoe UI, Arial, sans-serif" font-size="10">1-3 specialists</text>
  <text x="570" y="135" text-anchor="middle" fill="#fef3c7" font-family="Segoe UI, Arial, sans-serif" font-size="10">Choose model</text>
  <text x="570" y="150" text-anchor="middle" fill="#fef3c7" font-family="Segoe UI, Arial, sans-serif" font-size="10">Check dependencies</text>

  <!-- Arrow 4 -> Row 2 (down + right) -->
  <path d="M 630 115 L 660 115 L 660 200 L 60 200 L 60 240" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Row 2: Steps 5-7 -->
  <!-- Step 5: Dispatch Agents -->
  <rect x="30" y="245" width="200" height="120" rx="10" fill="url(#box5)" filter="url(#shadow)"/>
  <text x="130" y="275" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">Dispatch Agents</text>
  <text x="130" y="300" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, Arial, sans-serif" font-size="11">Parallel if INDEPENDENT</text>
  <text x="130" y="318" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, Arial, sans-serif" font-size="11">Sequential if DEPENDENT</text>
  <text x="130" y="336" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, Arial, sans-serif" font-size="11">Confidence: HIGH/MED/LOW</text>
  <text x="130" y="354" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, Arial, sans-serif" font-size="11">Handoff notes between agents</text>

  <!-- Arrow 5->6 -->
  <line x1="230" y1="305" x2="295" y2="305" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: Review -->
  <rect x="300" y="245" width="200" height="120" rx="10" fill="url(#box6)" filter="url(#shadow)"/>
  <text x="400" y="275" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">Review Agent</text>
  <text x="400" y="300" text-anchor="middle" fill="#fecaca" font-family="Segoe UI, Arial, sans-serif" font-size="11">Completeness check</text>
  <text x="400" y="318" text-anchor="middle" fill="#fecaca" font-family="Segoe UI, Arial, sans-serif" font-size="11">Conflict detection</text>
  <text x="400" y="336" text-anchor="middle" fill="#fecaca" font-family="Segoe UI, Arial, sans-serif" font-size="11">Integration verification</text>
  <text x="400" y="354" text-anchor="middle" fill="#fecaca" font-family="Segoe UI, Arial, sans-serif" font-size="11">APPROVE / REVISE / ESCALATE</text>

  <!-- Arrow 6->7 -->
  <line x1="500" y1="305" x2="565" y2="305" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 7: Synthesize -->
  <rect x="570" y="245" width="200" height="120" rx="10" fill="url(#box7)" filter="url(#shadow)"/>
  <text x="670" y="275" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">Synthesize</text>
  <text x="670" y="300" text-anchor="middle" fill="#fbcfe8" font-family="Segoe UI, Arial, sans-serif" font-size="11">Merge agent outputs</text>
  <text x="670" y="318" text-anchor="middle" fill="#fbcfe8" font-family="Segoe UI, Arial, sans-serif" font-size="11">Resolve conflicts</text>
  <text x="670" y="336" text-anchor="middle" fill="#fbcfe8" font-family="Segoe UI, Arial, sans-serif" font-size="11">Aggregate confidence</text>
  <text x="670" y="354" text-anchor="middle" fill="#fbcfe8" font-family="Segoe UI, Arial, sans-serif" font-size="11">Present unified answer</text>

  <!-- Output arrow -->
  <line x1="770" y1="305" x2="820" y2="305" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="825" y="280" width="80" height="50" rx="25" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="865" y="310" text-anchor="middle" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold">Done</text>

  <!-- Note about review being optional for single agent -->
  <text x="400" y="390" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-style="italic">* Review Agent activates only when 2+ agents are dispatched</text>
</svg>