<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="50%" style="stop-color:#0d0b1a"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </radialGradient>
    <!-- Central orb glow -->
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
      <stop offset="40%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <!-- Agent node gradients -->
    <radialGradient id="node1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </radialGradient>
    <radialGradient id="node2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </radialGradient>
    <radialGradient id="node3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </radialGradient>
    <radialGradient id="node4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </radialGradient>
    <radialGradient id="node5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </radialGradient>
    <radialGradient id="node6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </radialGradient>
    <radialGradient id="node7" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </radialGradient>
    <radialGradient id="node8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </radialGradient>
    <!-- Glow filters -->
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowText" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Star sparkle -->
    <filter id="sparkle" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGlow)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/><line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Outer orbit ring -->
  <ellipse cx="600" cy="200" rx="260" ry="160" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.15"/>
  <ellipse cx="600" cy="200" rx="200" ry="120" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.1"/>

  <!-- Central glow -->
  <ellipse cx="600" cy="200" rx="180" ry="140" fill="url(#orbGlow)"/>

  <!-- Connection lines from center to nodes (pulsing effect via opacity) -->
  <g stroke-width="1.5" opacity="0.35">
    <line x1="600" y1="200" x2="370" y2="80" stroke="#60a5fa"/>
    <line x1="600" y1="200" x2="830" y2="80" stroke="#34d399"/>
    <line x1="600" y1="200" x2="300" y2="200" stroke="#f472b6"/>
    <line x1="600" y1="200" x2="900" y2="200" stroke="#fbbf24"/>
    <line x1="600" y1="200" x2="370" y2="320" stroke="#38bdf8"/>
    <line x1="600" y1="200" x2="830" y2="320" stroke="#fb923c"/>
    <line x1="600" y1="200" x2="480" y2="55" stroke="#a78bfa"/>
    <line x1="600" y1="200" x2="720" y2="345" stroke="#f87171"/>
  </g>

  <!-- Agent nodes orbiting -->
  <!-- Node 1: Backend Dev -->
  <circle cx="370" cy="80" r="28" fill="url(#node1)" filter="url(#glowSoft)" opacity="0.9"/>
  <text x="370" y="76" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="8" font-weight="bold">Backend</text>
  <text x="370" y="88" text-anchor="middle" fill="#bfdbfe" font-family="Segoe UI, system-ui, sans-serif" font-size="7">Developer</text>

  <!-- Node 2: Frontend Dev -->
  <circle cx="830" cy="80" r="28" fill="url(#node2)" filter="url(#glowSoft)" opacity="0.9"/>
  <text x="830" y="76" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="8" font-weight="bold">Frontend</text>
  <text x="830" y="88" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, system-ui, sans-serif" font-size="7">Developer</text>

  <!-- Node 3: UX Designer -->
  <circle cx="300" cy="200" r="25" fill="url(#node3)" filter="url(#glowSoft)" opacity="0.9"/>
  <text x="300" y="197" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="8" font-weight="bold">UX</text>
  <text x="300" y="208" text-anchor="middle" fill="#fbcfe8" font-family="Segoe UI, system-ui, sans-serif" font-size="7">Designer</text>

  <!-- Node 4: DevOps -->
  <circle cx="900" cy="200" r="25" fill="url(#node4)" filter="url(#glowSoft)" opacity="0.9"/>
  <text x="900" y="197" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="8" font-weight="bold">DevOps</text>
  <text x="900" y="208" text-anchor="middle" fill="#fef3c7" font-family="Segoe UI, system-ui, sans-serif" font-size="7">Engineer</text>

  <!-- Node 5: Data Scientist -->
  <circle cx="370" cy="320" r="28" fill="url(#node5)" filter="url(#glowSoft)" opacity="0.9"/>
  <text x="370" y="316" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="8" font-weight="bold">Data</text>
  <text x="370" y="328" text-anchor="middle" fill="#bae6fd" font-family="Segoe UI, system-ui, sans-serif" font-size="7">Scientist</text>

  <!-- Node 6: Security -->
  <circle cx="830" cy="320" r="28" fill="url(#node6)" filter="url(#glowSoft)" opacity="0.9"/>
  <text x="830" y="316" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="8" font-weight="bold">Security</text>
  <text x="830" y="328" text-anchor="middle" fill="#fed7aa" font-family="Segoe UI, system-ui, sans-serif" font-size="7">Architect</text>

  <!-- Node 7: Architect -->
  <circle cx="480" cy="55" r="22" fill="url(#node7)" filter="url(#glowSoft)" opacity="0.85"/>
  <text x="480" y="52" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="7" font-weight="bold">Software</text>
  <text x="480" y="62" text-anchor="middle" fill="#ddd6fe" font-family="Segoe UI, system-ui, sans-serif" font-size="6">Architect</text>

  <!-- Node 8: DBA -->
  <circle cx="720" cy="345" r="22" fill="url(#node8)" filter="url(#glowSoft)" opacity="0.85"/>
  <text x="720" y="342" text-anchor="middle" fill="white" font-family="Segoe UI, system-ui, sans-serif" font-size="7" font-weight="bold">Database</text>
  <text x="720" y="352" text-anchor="middle" fill="#fecaca" font-family="Segoe UI, system-ui, sans-serif" font-size="6">Admin</text>

  <!-- Floating small dots (distant agents) -->
  <circle cx="220" cy="120" r="8" fill="#818cf8" opacity="0.3" filter="url(#sparkle)"/>
  <circle cx="980" cy="130" r="6" fill="#22d3ee" opacity="0.25" filter="url(#sparkle)"/>
  <circle cx="200" cy="300" r="7" fill="#f472b6" opacity="0.25" filter="url(#sparkle)"/>
  <circle cx="1000" cy="290" r="9" fill="#fbbf24" opacity="0.2" filter="url(#sparkle)"/>
  <circle cx="520" cy="350" r="5" fill="#34d399" opacity="0.3" filter="url(#sparkle)"/>
  <circle cx="680" cy="50" r="6" fill="#fb923c" opacity="0.25" filter="url(#sparkle)"/>
  <circle cx="150" cy="190" r="4" fill="#60a5fa" opacity="0.2"/>
  <circle cx="1050" cy="210" r="5" fill="#a78bfa" opacity="0.2"/>

  <!-- Central hub -->
  <circle cx="600" cy="200" r="52" fill="#0f0a2a" stroke="#a78bfa" stroke-width="2" filter="url(#glowStrong)" opacity="0.95"/>
  <circle cx="600" cy="200" r="52" fill="none" stroke="#c4b5fd" stroke-width="0.5" opacity="0.5"/>

  <!-- Central icon: dispatcher symbol -->
  <g transform="translate(600, 185)">
    <!-- Hexagon shape -->
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.8"/>
    <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="#7c3aed" opacity="0.6"/>
    <!-- Dispatch arrows radiating out -->
    <line x1="0" y1="-14" x2="0" y2="-22" stroke="#e0d4ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="12" y1="7" x2="19" y2="11" stroke="#e0d4ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="-12" y1="7" x2="-19" y2="11" stroke="#e0d4ff" stroke-width="1.5" opacity="0.8"/>
  </g>
  <text x="600" y="218" text-anchor="middle" fill="#e0d4ff" font-family="Segoe UI, system-ui, sans-serif" font-size="9" font-weight="bold" letter-spacing="1">DISPATCHER</text>

  <!-- Title text -->
  <text x="600" y="30" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="bold" letter-spacing="3" opacity="0.5">CLAUDE CODE  /  CODEX CLI  /  OPENCODE</text>

  <!-- Main title with glow -->
  <text x="600" y="395" text-anchor="middle" fill="#a78bfa" font-family="Segoe UI, system-ui, sans-serif" font-size="9" letter-spacing="4" opacity="0.6">ONE REQUEST, THE RIGHT EXPERTS, INSTANT COLLABORATION</text>

  <!-- Left side label -->
  <g transform="translate(70, 60)">
    <rect x="0" y="0" width="90" height="24" rx="12" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="0.5"/>
    <text x="45" y="16" text-anchor="middle" fill="#c4b5fd" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="bold">185+ Roles</text>
  </g>

  <!-- Right side label -->
  <g transform="translate(1040, 60)">
    <rect x="0" y="0" width="100" height="24" rx="12" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="0.5"/>
    <text x="50" y="16" text-anchor="middle" fill="#c4b5fd" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="bold">13 Categories</text>
  </g>

  <!-- Bottom left: tool icons as small badges -->
  <g transform="translate(60, 355)">
    <rect x="0" y="0" width="65" height="20" rx="10" fill="#2563eb" opacity="0.3" stroke="#60a5fa" stroke-width="0.5"/>
    <text x="32" y="14" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI, system-ui, sans-serif" font-size="8">Claude</text>
  </g>
  <g transform="translate(135, 355)">
    <rect x="0" y="0" width="55" height="20" rx="10" fill="#059669" opacity="0.3" stroke="#34d399" stroke-width="0.5"/>
    <text x="28" y="14" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI, system-ui, sans-serif" font-size="8">Codex</text>
  </g>
  <g transform="translate(200, 355)">
    <rect x="0" y="0" width="75" height="20" rx="10" fill="#ea580c" opacity="0.3" stroke="#fb923c" stroke-width="0.5"/>
    <text x="38" y="14" text-anchor="middle" fill="#fdba74" font-family="Segoe UI, system-ui, sans-serif" font-size="8">OpenCode</text>
  </g>
</svg>